apiVersion: apps/v1
kind: Deployment
metadata:
  name: agrofrugal
  namespace: frugal
  labels:
    app: agrofrugal
    project: agriculture
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agrofrugal
  template:
    metadata:
      labels:
        app: agrofrugal
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: agrofrugal:edge
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis.frugal.svc.cluster.local:6379/0"
          # TODO Phase 4 - Right-sizing K3d :
          # `requests` = P95 réel mesuré sur 7 jours via `kubectl top pods`.
          # `limits` = 2 x requests (règle simple, évite OOM en pic saisonnier).
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 30
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: agrofrugal
  namespace: frugal
spec:
  selector:
    app: agrofrugal
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agrofrugal
  namespace: frugal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agrofrugal
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Scale-to-zero entre saisons (novembre -> février) -> 60% éco infra
# Activer manuellement via : kubectl scale deploy/agrofrugal --replicas=0 -n frugal
apiVersion: v1
kind: ConfigMap
metadata:
  name: agrofrugal-seasonal-schedule
  namespace: frugal
data:
  note: |
    Saisons actives: mars-octobre (cultures en croissance/récolte).
    Saison morte: novembre-février -> scale-to-zero recommandé.
    Bascule manuelle plutôt qu'automatique (météo régionale variable).
